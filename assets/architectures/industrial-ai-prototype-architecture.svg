<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1210" viewBox="0 0 1200 1210" role="img" aria-labelledby="title desc">
  <title id="title">Industrial AI Prototype | Arquitectura de integración tecnológica</title>
  <desc id="desc">SCADA-like • historian SQLite • FastAPI • Streamlit • Machine Learning</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#087f8c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 800 42px Arial, sans-serif; fill: #123f69; }
      .subtitle { font: 700 21px Arial, sans-serif; fill: #49637f; }
      .step-title { font: 800 25px Arial, sans-serif; fill: #0f172a; }
      .step-body { font: 400 20px Arial, sans-serif; fill: #2f4663; }
      .num { font: 800 26px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect x="0" y="0" width="1200" height="1210" rx="28" fill="url(#bg)"/>
  <rect x="32" y="112" width="1136" height="1070" rx="28" fill="#ffffff" opacity="0.58" stroke="#d9e8ff" stroke-width="2"/>
  <!-- header-safe-zone-v30: avoids title overlap with background border -->
  <rect x="160" y="18" width="880" height="92" rx="22" fill="url(#bg)" opacity="0.96"/>
  <text x="600" y="54" text-anchor="middle" class="title">Industrial AI Prototype</text>
  <text x="600" y="90" text-anchor="middle" class="subtitle">SCADA-like • historian SQLite • FastAPI • Streamlit • Machine Learning</text>
  <rect x="78" y="128" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="181" r="29" fill="url(#badge)"/>
  <text x="128" y="190" text-anchor="middle" class="num">1</text>
<text x="190" y="166" class="step-title" text-anchor="start"><tspan x="190" dy="0">Simulador industrial</tspan></text>
<text x="190" y="200" class="step-body" text-anchor="start"><tspan x="190" dy="0">Genera temperatura • presión • flujo • vibración con comportamiento realista.</tspan></text>
  <line x1="600" y1="241" x2="600" y2="251" class="arrow"/>
  <path d="M591 242 L600 251 L609 242" fill="none" class="arrow"/>
  <rect x="78" y="258" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="311" r="29" fill="url(#badge)"/>
  <text x="128" y="320" text-anchor="middle" class="num">2</text>
<text x="190" y="296" class="step-title" text-anchor="start"><tspan x="190" dy="0">Historian SQLite</tspan></text>
<text x="190" y="330" class="step-body" text-anchor="start"><tspan x="190" dy="0">Persistencia histórica de variables operativas simuladas.</tspan></text>
  <line x1="600" y1="371" x2="600" y2="381" class="arrow"/>
  <path d="M591 372 L600 381 L609 372" fill="none" class="arrow"/>
  <rect x="78" y="388" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="441" r="29" fill="url(#badge)"/>
  <text x="128" y="450" text-anchor="middle" class="num">3</text>
<text x="190" y="426" class="step-title" text-anchor="start"><tspan x="190" dy="0">API FastAPI</tspan></text>
<text x="190" y="460" class="step-body" text-anchor="start"><tspan x="190" dy="0">Consulta histórica • endpoints REST • predicción IA.</tspan></text>
  <line x1="600" y1="501" x2="600" y2="511" class="arrow"/>
  <path d="M591 502 L600 511 L609 502" fill="none" class="arrow"/>
  <rect x="78" y="518" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="571" r="29" fill="url(#badge)"/>
  <text x="128" y="580" text-anchor="middle" class="num">4</text>
<text x="190" y="556" class="step-title" text-anchor="start"><tspan x="190" dy="0">Machine Learning</tspan></text>
<text x="190" y="590" class="step-body" text-anchor="start"><tspan x="190" dy="0">RandomForestRegressor para estimación de temperatura.</tspan></text>
  <line x1="600" y1="631" x2="600" y2="641" class="arrow"/>
  <path d="M591 632 L600 641 L609 632" fill="none" class="arrow"/>
  <rect x="78" y="648" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="701" r="29" fill="url(#badge)"/>
  <text x="128" y="710" text-anchor="middle" class="num">5</text>
<text x="190" y="686" class="step-title" text-anchor="start"><tspan x="190" dy="0">Dashboard Streamlit</tspan></text>
<text x="190" y="720" class="step-body" text-anchor="start"><tspan x="190" dy="0">Vista HMI-like para monitoreo, tendencias y alertas.</tspan></text>
  <line x1="600" y1="761" x2="600" y2="771" class="arrow"/>
  <path d="M591 762 L600 771 L609 762" fill="none" class="arrow"/>
  <rect x="78" y="778" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="831" r="29" fill="url(#badge)"/>
  <text x="128" y="840" text-anchor="middle" class="num">6</text>
<text x="190" y="816" class="step-title" text-anchor="start"><tspan x="190" dy="0">Cloud deployment</tspan></text>
<text x="190" y="850" class="step-body" text-anchor="start"><tspan x="190" dy="0">Docker • Render.com • GitHub • flujo reproducible.</tspan></text>
  <line x1="600" y1="891" x2="600" y2="901" class="arrow"/>
  <path d="M591 892 L600 901 L609 892" fill="none" class="arrow"/>
  <rect x="78" y="908" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="961" r="29" fill="url(#badge)"/>
  <text x="128" y="970" text-anchor="middle" class="num">7</text>
<text x="190" y="946" class="step-title" text-anchor="start"><tspan x="190" dy="0">Operación inteligente</tspan></text>
<text x="190" y="980" class="step-body" text-anchor="start"><tspan x="190" dy="0">Une simulación, persistencia, API y analítica en tiempo real.</tspan></text>
  <line x1="600" y1="1021" x2="600" y2="1031" class="arrow"/>
  <path d="M591 1022 L600 1031 L609 1022" fill="none" class="arrow"/>
  <rect x="78" y="1038" width="1044" height="106" rx="22" fill="#ffffff" stroke="#cfe1ff" stroke-width="2.2" filter="url(#shadow)"/>
  <circle cx="128" cy="1091" r="29" fill="url(#badge)"/>
  <text x="128" y="1100" text-anchor="middle" class="num">8</text>
<text x="190" y="1076" class="step-title" text-anchor="start"><tspan x="190" dy="0">Valor industrial</tspan></text>
<text x="190" y="1110" class="step-body" text-anchor="start"><tspan x="190" dy="0">MVP funcional para monitoreo industrial y predicción operativa.</tspan></text>
</svg>
