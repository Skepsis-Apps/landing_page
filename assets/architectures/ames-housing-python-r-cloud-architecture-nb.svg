<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1210" viewBox="0 0 1200 1210" role="img" aria-labelledby="title desc">
  <title id="title">Ames Housing Price Predictor (Python + R Cloud Edition) | Teknologisk integrasjonsarkitektur</title>
  <desc id="desc">Python + R / FastAPI / maskinlæring</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#087f8c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 800 43px Arial, sans-serif; fill: #123f69; }
      .subtitle { font: 700 21px Arial, sans-serif; fill: #49637f; }
      .box-title { font: 800 25px Arial, sans-serif; fill: #071225; }
      .box-text { font: 400 20px Arial, sans-serif; fill: #233b56; }
      .num { font: 800 28px Arial, sans-serif; fill: white; }
      .arrow { font: 800 35px Arial, sans-serif; fill: #2563eb; }
    </style>
  </defs>
  <rect width="1200" height="1210" rx="32" fill="url(#bg)"/>
  <rect x="48" y="175" width="1104" height="980" rx="26" fill="#ffffff" opacity="0.62" stroke="#dbeafe" stroke-width="2"/>
  <text x="600" y="60" text-anchor="middle" class="title">Ames Housing Price Predictor</text>
  <text x="600" y="102" text-anchor="middle" class="title">(Python + R Cloud Edition)</text>
  <text x="600" y="145" text-anchor="middle" class="subtitle">Python + R / FastAPI / maskinlæring</text>
  <g filter="url(#shadow)">
    <rect x="110" y="305" width="980" height="118" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="155" cy="364" r="35" fill="url(#badge)"/>
    <text x="155" y="374" text-anchor="middle" class="num">1</text>
    <text x="235" y="348" class="box-title">Bruker via HTTPS</text>
    <text x="235" y="383" class="box-text">Tilgang til webapplikasjonen på Render.</text>
  </g>
  <text x="600" y="453" text-anchor="middle" class="arrow">↓</text>
  <g filter="url(#shadow)">
    <rect x="110" y="457" width="980" height="118" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="155" cy="516" r="35" fill="url(#badge)"/>
    <text x="155" y="526" text-anchor="middle" class="num">2</text>
    <text x="235" y="500" class="box-title">FastAPI + Jinja2</text>
    <text x="235" y="535" class="box-text">Python-tjeneste for grensesnitt, validering og forretningslogikk.</text>
  </g>
  <text x="600" y="605" text-anchor="middle" class="arrow">↓</text>
  <g filter="url(#shadow)">
    <rect x="110" y="609" width="980" height="118" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="155" cy="668" r="35" fill="url(#badge)"/>
    <text x="155" y="678" text-anchor="middle" class="num">3</text>
    <text x="235" y="652" class="box-title">Validering og rapporter</text>
    <text x="235" y="687" class="box-text">Inndata, historikk, PDF-rapporter og kommunikasjon med R.</text>
  </g>
  <text x="600" y="757" text-anchor="middle" class="arrow">↓</text>
  <g filter="url(#shadow)">
    <rect x="110" y="761" width="980" height="118" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="155" cy="820" r="35" fill="url(#badge)"/>
    <text x="155" y="830" text-anchor="middle" class="num">4</text>
    <text x="235" y="804" class="box-title">R Plumber</text>
    <text x="235" y="839" class="box-text">REST API i R for å laste glmnet og kjøre prediksjon.</text>
  </g>
  <text x="600" y="909" text-anchor="middle" class="arrow">↓</text>
  <g filter="url(#shadow)">
    <rect x="110" y="913" width="980" height="118" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="155" cy="972" r="35" fill="url(#badge)"/>
    <text x="155" y="982" text-anchor="middle" class="num">5</text>
    <text x="235" y="956" class="box-title">LASSO-modell</text>
    <text x="235" y="991" class="box-text">Prediksjon, konfidensintervaller og ggplot2-grafer.</text>
  </g>
  <text x="600" y="1061" text-anchor="middle" class="arrow">↓</text>
  <g filter="url(#shadow)">
    <rect x="110" y="1065" width="980" height="118" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2"/>
    <circle cx="155" cy="1124" r="35" fill="url(#badge)"/>
    <text x="155" y="1134" text-anchor="middle" class="num">6</text>
    <text x="235" y="1108" class="box-title">Render Cloud</text>
    <text x="235" y="1143" class="box-text">To webtjenester koblet sammen via HTTPS.</text>
  </g>
  <text x="600" y="1175" text-anchor="middle" class="subtitle">Flerspråklig arkitektur validert for Sképsis Apps-porteføljen</text>
</svg>